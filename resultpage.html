<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Findings — Phishly</title>
        <link rel="stylesheet" href="resultpage.css">
    </head>
    <body>
 
        <!-- Loading overlay -->
        <div id="loading-overlay">
            <div id="loading-content">
                <div id="loading-spinner"></div>
                <p id="loading-message">Analyzing...</p>
            </div>
        </div>
 
        <!-- Results -->
        <div id="results-container" style="display:none;" class="page-wrapper">
 
            <div class="header">
                <h1>Phishly — Findings</h1>
            </div>
 
            <!-- Risk meter -->
            <div class="risk-meter-wrapper">
                <div class="risk-meter-bar">
                    <div class="risk-meter-needle" id="risk-needle">
                        <span class="needle-label" id="needle-label">Clean</span>
                    </div>
                </div>
                <div class="risk-meter-labels">
                    <span>Clean</span>
                    <span>Low</span>
                    <span>Moderate</span>
                    <span>High</span>
                    <span>Critical</span>
                </div>
                
            </div>
 
            <!-- Coverage -->
            <div id="coverage-summary"></div>
 
            <!-- Signal cards -->
            <div class="section-label">Signal Breakdown</div>
            <div class="signal-breakdown">
                <div class="signal-row"><div id="sender"></div></div>
                <div class="signal-row"><div id="content-analysis"></div></div>
                <div class="signal-row"><div id="Suspicious Links"></div></div>
            </div>
 
            <!-- User context -->
            <div class="section-label">User-Provided Context</div>
            <p id="user-context-breakdown-text"></p>
 
            <!-- Summary -->
            <div class="section-label" style="margin-top:24px;">What This Means</div>
            <p id="what-this-means-text"></p>
 
            <button id="go_back" type="button">Go back</button>
 
        </div>
 
        <script src="config.js"></script>
        <script src="resultpage.js"></script>
    </body>
</html>
